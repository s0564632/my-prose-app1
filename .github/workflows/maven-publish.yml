name: Publish Maven Package

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Java JDK 21 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: settings.xml für GitHub Packages generieren
        run: |
          mkdir -p ~/.m2
          echo "<settings><servers><server><id>github</id><username>\${{ github.actor }}</username><password>\${{ secrets.GITHUB_TOKEN }}</password></server></servers></settings>" > ~/.m2/settings.xml

      - name: Artefakt deployen
        run: mvn clean deploy
